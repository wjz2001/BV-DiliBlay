[versions]
akdanmaku = "1.0.2"
androidsvg = "1.4"
coil = "2.7.0"
firebase-bom = "34.12.0"
geetest-sensebot = "4.4.4"
grpc = "1.80.0"
grpc-kotlin = "1.5.0"
jsoup = "1.22.1"
koin-bom = "4.1.0"
koin-ksp-compiler = "2.3.1"
kotlinx-coroutines = "1.10.2"
kotlinx-serialization = "1.11.0"
koin-annotations = "2.3.1"
ktor = "3.4.2"
logging = "8.0.01"
lottie = "6.6.6"
material = "1.13.0"
